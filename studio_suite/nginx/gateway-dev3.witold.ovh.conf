# Gateway Nginx vhost for Studio Suite (dev3)
server {
    listen 80;
    server_name dev3.witold.ovh;

    location = / {
        return 302 https://$host/public/client-booking;
    }

    location = /health {
        proxy_pass http://192.168.50.20:8004/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/ {
        proxy_pass http://192.168.50.20:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://192.168.50.20:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_buffering off;
    }
}
