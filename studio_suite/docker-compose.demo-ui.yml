name: studio_suite_demo_ui

services:
  demo_ui:
    image: nginx:1.27-alpine
    container_name: studio_suite_demo_ui
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx/demo-ui.conf:/etc/nginx/conf.d/default.conf:ro


